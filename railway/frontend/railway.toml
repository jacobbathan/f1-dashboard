[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.frontend"
watchPatterns = [
    "frontend/**",
    "Dockerfile.frontend",
    "requirements.txt",
    "pyproject.toml",
    "uv.lock",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
