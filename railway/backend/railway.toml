[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"
watchPatterns = [
    "backend/**",
    "Dockerfile.backend",
    "requirements.txt",
    "pyproject.toml",
    "uv.lock",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
